<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédle — Classic</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky1: #87ceeb;
      --sky2: #b8e4f7;
      --blue-box: #4a90d9;
      --blue-box-dark: #2c6fad;
      --correct: #4caf50;
      --incorrect: #e53935;
      --partial: #e6952a;
      --white: #ffffff;
      --tile-radius: 16px;
      --font-pixel: 'Press Start 2P', monospace;
      --font-main: 'Fredoka One', cursive;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      background: linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 100%);
      min-height: 100vh;
      background-attachment: fixed;
      visibility: hidden;
    }
    body.ready { visibility: visible; }

    /* ===== PIXEL CLOUDS ===== */
    .clouds {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      opacity: .9;
      image-rendering: pixelated;
    }
    .cloud::before, .cloud::after {
      content: ''; position: absolute;
      background: white; border-radius: 50px;
    }
    .c1 { width:80px; height:28px; top:8%; left:4%; }
    .c1::before { width:44px; height:44px; top:-22px; left:10px; border-radius:50%; }
    .c1::after  { width:32px; height:32px; top:-14px; left:36px; border-radius:50%; }
    .c2 { width:100px; height:32px; top:18%; right:8%; }
    .c2::before { width:52px; height:52px; top:-28px; left:14px; border-radius:50%; }
    .c2::after  { width:38px; height:38px; top:-18px; left:50px; border-radius:50%; }
    .c3 { width:68px; height:24px; top:5%; right:28%; }
    .c3::before { width:36px; height:36px; top:-18px; left:8px; border-radius:50%; }
    .c3::after  { width:28px; height:28px; top:-12px; left:32px; border-radius:50%; }
    .c4 { width:90px; height:28px; top:30%; left:12%; opacity:.6; }
    .c4::before { width:48px; height:48px; top:-24px; left:12px; border-radius:50%; }

    /* ===== LAYOUT ===== */
    .page {
      position: relative; z-index: 1;
      max-width: 920px;
      margin: 0 auto;
      padding: 18px 16px 60px;
    }

    /* ===== HEADER ===== */
    .site-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
    }
    .logo {
      font-family: var(--font-pixel);
      font-size: .9rem;
      color: var(--blue-box-dark);
      text-shadow: 2px 2px 0 rgba(0,0,0,.15);
      letter-spacing: 1px;
    }
    .header-right { display: flex; gap: 8px; align-items: center; }
    .streak-chip {
      background: var(--blue-box);
      color: white;
      border-radius: 20px;
      padding: 6px 14px;
      font-family: var(--font-pixel);
      font-size: .55rem;
      display: flex; gap: 8px; align-items: center;
    }
    .streak-chip strong { font-size: .75rem; }
    .icon-btn {
      background: var(--blue-box);
      color: white; border: none;
      border-radius: 10px;
      width: 36px; height: 36px;
      cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .icon-btn:hover { background: var(--blue-box-dark); }

    /* ===== INPUT BOX ===== */
    .input-card {
      background: var(--blue-box);
      border-radius: 20px;
      padding: 16px 20px;
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 14px;
      box-shadow: 0 4px 0 var(--blue-box-dark), 0 6px 16px rgba(0,0,0,.18);
      flex-wrap: wrap;
    }
    .guess-label {
      font-family: var(--font-pixel);
      font-size: .65rem;
      color: white;
      white-space: nowrap;
      text-shadow: 1px 1px 0 rgba(0,0,0,.3);
    }
    .ac-wrap { position: relative; flex: 1; min-width: 200px; }
    .pokemon-input {
      width: 100%;
      padding: 11px 16px;
      border-radius: 12px;
      border: none; outline: none;
      font-family: var(--font-main);
      font-size: 1rem; font-weight: 600;
      background: white;
      color: #222;
    }
    .pokemon-input::placeholder { color: #aaa; font-weight: 400; }

    /* Hint button (earned) */
    .hint-earn-btn {
      background: var(--blue-box-dark);
      color: white;
      border: 3px solid white;
      border-radius: 14px;
      padding: 9px 16px;
      font-family: var(--font-pixel);
      font-size: .6rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, transform .1s;
      display: flex; align-items: center; gap: 6px;
      box-shadow: 0 3px 0 rgba(0,0,0,.3);
    }
    .hint-earn-btn:hover:not(:disabled) { background: #1a4f8a; transform: translateY(-1px); }
    .hint-earn-btn:disabled { opacity: .45; cursor: not-allowed; }
    .hint-earn-btn .plus { font-size: 1.1rem; font-family: sans-serif; }

    /* Guesses-until-hint counter */
    .hint-progress {
      background: var(--blue-box-dark);
      color: white;
      border-radius: 14px;
      padding: 9px 16px;
      font-family: var(--font-pixel);
      font-size: .55rem;
      white-space: nowrap;
      text-align: center;
      line-height: 1.7;
      box-shadow: 0 3px 0 rgba(0,0,0,.3);
    }
    .hint-progress .big { font-size: 1.2rem; display: block; color: #ffd43b; }

    /* ===== AUTOCOMPLETE ===== */
    .autocomplete-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: white; border-radius: 14px;
      max-height: 260px; overflow-y: auto;
      z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,.18);
    }
    .autocomplete-dropdown.hidden { display: none; }
    .ac-item {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 14px; cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background .12s;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover { background: #f0f6ff; }
    .ac-item img { width: 40px; height: 40px; image-rendering: pixelated; }
    .ac-item span { font-size: .95rem; font-weight: 700; color: #222; }

    /* ===== HINT PANEL ===== */
    .hint-panel {
      background: white;
      border-radius: 18px;
      margin-bottom: 14px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
      display: none;
    }
    .hint-panel.visible { display: block; }

    .hint-tabs {
      display: flex;
      background: var(--blue-box);
      border-bottom: 2px solid var(--blue-box-dark);
    }
    .hint-tab {
      flex: 1; padding: 10px 8px;
      font-family: var(--font-pixel);
      font-size: .55rem;
      color: white;
      cursor: pointer;
      border: none; background: none;
      display: flex; align-items: center; justify-content: center;
      gap: 5px; opacity: .6;
      border-right: 1px solid var(--blue-box-dark);
      transition: background .15s;
    }
    .hint-tab:last-child { border-right: none; }
    .hint-tab.active { opacity: 1; background: var(--blue-box-dark); }
    .hint-tab.locked { cursor: default; }
    .hint-tab .lock { font-size: .85rem; }

    .hint-body {
      padding: 24px;
      text-align: center;
      min-height: 120px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
    }
    .hint-type-label {
      font-family: var(--font-pixel);
      font-size: .6rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .hint-locked-msg {
      font-family: var(--font-pixel);
      font-size: .55rem;
      color: #bbb;
      line-height: 1.8;
    }
    .hint-tile {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 14px 28px;
      border-radius: var(--tile-radius);
      font-family: var(--font-pixel);
      font-size: .75rem;
      color: white;
      background: var(--correct);
      box-shadow: 0 4px 0 rgba(0,0,0,.2);
      min-width: 100px;
    }
    .hint-silhouette img {
      width: 100px; height: 100px;
      image-rendering: pixelated;
      filter: brightness(0) opacity(.8);
    }
    .hint-letter-box {
      font-family: var(--font-pixel);
      font-size: 2rem;
      color: var(--blue-box-dark);
      background: #e8f4ff;
      border: 3px solid var(--blue-box);
      border-radius: 12px;
      width: 70px; height: 70px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ===== TABLE ===== */
    /* 8 columns: image(90px) + 7 data cols */
    .game-table {
      display: grid;
      gap: 8px;
    }

    .table-header-row,
    .guess-row {
      display: grid;
      grid-template-columns: 90px repeat(7, 1fr);
      gap: 8px;
    }

    .table-header-row { margin-bottom: 10px; padding: 0 2px; }

    .th-cell {
      background: white;
      border-radius: 20px;
      padding: 8px 6px;
      text-align: center;
      font-family: var(--font-main);
      font-size: .78rem;
      font-weight: 700;
      color: #333;
      box-shadow: 0 2px 6px rgba(0,0,0,.1);
      line-height: 1.3;
    }

    /* ===== GUESS ROWS ===== */
    .guesses-list { display: flex; flex-direction: column; gap: 8px; }

    .guess-row {
      animation: rowIn .3s ease both;
    }

    .guess-img-cell {
      background: white;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      padding: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
      min-height: 80px;
    }
    .guess-img-cell img {
      width: 64px; height: 64px;
      image-rendering: pixelated;
      display: block;
    }

    .tile {
      border-radius: var(--tile-radius);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8px 6px;
      font-family: var(--font-pixel);
      font-size: .58rem;
      color: white;
      text-align: center;
      line-height: 1.5;
      min-height: 80px;
      box-shadow: 0 4px 0 rgba(0,0,0,.22);
      position: relative;
      word-break: break-word;
    }
    .tile.correct   { background: var(--correct); box-shadow: 0 4px 0 #2e7d32; }
    .tile.incorrect { background: var(--incorrect); box-shadow: 0 4px 0 #b71c1c; }
    .tile.partial   { background: var(--partial); box-shadow: 0 4px 0 #a05c00; }
    .tile.unknown   { background: #607d8b; box-shadow: 0 4px 0 #37474f; }

    .tile .arrow {
      font-size: .9rem;
      display: block;
      margin-top: 3px;
      opacity: .85;
    }

    /* Habitat tile */
    .habitat-tile {
      border-radius: var(--tile-radius);
      overflow: hidden;
      position: relative;
      min-height: 80px;
      box-shadow: 0 4px 0 rgba(0,0,0,.22);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }
    .habitat-tile img.habitat-pixel-art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      display: block;
    }
    .habitat-name {
      font-family: var(--font-pixel);
      font-size: .52rem;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,.9), 0 0 8px rgba(0,0,0,.8);
      text-align: center;
      padding: 2px 4px 8px;
      word-break: break-word;
      position: relative;
      z-index: 1;
    }
    .habitat-tile .habitat-incorrect-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 5px; background: var(--incorrect);
    }
    .habitat-tile .habitat-correct-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 5px; background: var(--correct);
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      font-family: var(--font-pixel);
      font-size: .65rem;
      color: #5a7ea8;
      line-height: 2.2;
    }

    /* ===== WIN MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(180,225,245,.72);
      display: flex; align-items: center; justify-content: center;
      z-index: 300;
      backdrop-filter: blur(6px);
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: white;
      border-radius: 28px;
      padding: 36px 32px 28px;
      max-width: 380px; width: 92%;
      box-shadow: 0 8px 0 #c8e8f4, 0 16px 48px rgba(0,0,0,.15);
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
      text-align: center; position: relative;
    }
    .modal-close {
      position: absolute; top: 14px; right: 14px;
      background: #f0f0f0; border: none;
      width: 32px; height: 32px; border-radius: 50%;
      cursor: pointer; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .modal-close:hover { background: #e53935; color: white; }
    .modal-title {
      font-family: var(--font-pixel);
      font-size: 1.6rem;
      color: var(--blue-box);
      text-shadow: 3px 3px 0 #2c6fad, 1px 1px 0 #2c6fad;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }
    .modal-guessed-label {
      font-family: var(--font-main);
      font-size: 1rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 16px;
    }
    .modal-guessed-label span {
      color: #4caf50;
      font-style: italic;
    }
    .modal-pokemon img {
      width: 160px; height: 160px; image-rendering: pixelated;
      display: block; margin: 0 auto 20px;
      animation: pkmnBounce 0.6s cubic-bezier(.34,1.56,.64,1) 0.2s both;
    }
    @keyframes pkmnBounce {
      from { transform: scale(0) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0);    opacity: 1; }
    }
    .btn-play-again {
      width: 100%; padding: 14px;
      background: var(--blue-box); color: white; border: none;
      border-radius: 14px;
      font-family: var(--font-pixel); font-size: .65rem;
      cursor: pointer; transition: background .15s, transform .1s;
      box-shadow: 0 4px 0 var(--blue-box-dark);
    }
    .btn-play-again:hover { background: var(--blue-box-dark); transform: translateY(-1px); }

    /* ===== TOAST ===== */
    #toastWrap {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      z-index: 500; display: flex; flex-direction: column;
      align-items: center; gap: 8px; pointer-events: none;
    }
    .toast {
      background: #1a1a2e; color: white;
      padding: 10px 22px; border-radius: 20px;
      font-family: var(--font-pixel); font-size: .6rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      animation: toastIn .2s ease;
    }
    .toast.err { background: var(--incorrect); }

    /* ===== LOADING ===== */
    #loadOverlay {
      position: fixed; inset: 0;
      background: rgba(135,206,235,.85);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 400; gap: 18px;
    }
    #loadOverlay.hidden { display: none; }
    .pokeball {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(180deg, #e53935 50%, white 50%);
      border: 4px solid #222;
      animation: spin 1s linear infinite; position: relative;
    }
    .pokeball::after {
      content: ''; position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 14px; height: 14px;
      background: white; border-radius: 50%;
      border: 4px solid #222;
    }
    #loadOverlay p { font-family: var(--font-pixel); font-size: .6rem; color: #1a5f8a; }

    /* ===== KEYFRAMES ===== */
    @keyframes rowIn {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-8px) translateX(-50%); }
      to   { opacity: 1; transform: translateY(0) translateX(-50%); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== CARD FLIP ANIMATION ===== */
    /* Tiles start gray, flip flat, then reveal color - like Wordle/Pokedle */
    @keyframes tileFlip {
      0%   { transform: scaleX(1); background: #8aabbc !important; box-shadow: 0 4px 0 #5a8090 !important; color: transparent !important; }
      40%  { transform: scaleX(0); background: #8aabbc !important; box-shadow: 0 4px 0 #5a8090 !important; color: transparent !important; }
      41%  { transform: scaleX(0); }
      100% { transform: scaleX(1); }
    }
    @keyframes habFlip {
      0%   { transform: scaleX(1); filter: grayscale(1) brightness(0.55); }
      40%  { transform: scaleX(0); filter: grayscale(1) brightness(0.55); }
      41%  { transform: scaleX(0); }
      100% { transform: scaleX(1); filter: none; }
    }
    .tile.flip {
      animation: tileFlip 0.7s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    .habitat-tile.flip {
      animation: habFlip 0.7s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 700px) {
      .table-header-row, .guess-row {
        grid-template-columns: 60px repeat(7, 1fr);
        gap: 5px;
      }
      .th-cell { font-size: .62rem; padding: 6px 3px; }
      .tile { font-size: .48rem; min-height: 64px; padding: 6px 3px; }
      .guess-img-cell { min-height: 64px; }
      .guess-img-cell img { width: 46px; height: 46px; }
      .habitat-tile { min-height: 64px; }
    }
  </style>
</head>
<body>

<!-- clouds -->
<div class="clouds">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="cloud c4"></div>
</div>

<div class="page">

  <!-- HEADER -->
  <div class="site-header">
    <div class="logo">Pokédle</div>
    <div class="header-right">
      <div class="streak-chip">🔥 <strong id="streakVal">0</strong> &nbsp;🏆 <strong id="bestVal">0</strong></div>
      <button class="icon-btn" id="soundBtn" title="Sound">🔊</button>
      <button class="icon-btn" id="themeBtn" title="Theme" style="display:none">🌙</button>
    </div>
  </div>

  <!-- INPUT CARD -->
  <div class="input-card">
    <span class="guess-label">Guess:</span>
    <div class="ac-wrap">
      <input type="text" id="pokemonInput" class="pokemon-input" placeholder="Type a Pokémon name…" autocomplete="off">
      <div id="dropdown" class="autocomplete-dropdown hidden"></div>
    </div>
    <!-- Shows as "Guesses left for HINT: N" until earned, then "HINT +" button -->
    <div id="hintProgressBox" class="hint-progress">
      Guesses left<br>for HINT:<br><span class="big" id="hintCountdown">3</span>
    </div>
    <button id="hintBtn" class="hint-earn-btn" style="display:none">
      HINT <span class="plus">+</span>
    </button>
  </div>

  <!-- HINT PANEL (shown after first hint earned) -->
  <div class="hint-panel" id="hintPanel">
    <div class="hint-tabs" id="hintTabs">
      <button class="hint-tab active" data-idx="0">HINT 1</button>
      <button class="hint-tab locked" data-idx="1">HINT 2 <span class="lock">🔒</span></button>
      <button class="hint-tab locked" data-idx="2">HINT 3 <span class="lock">🔒</span></button>
    </div>
    <div class="hint-body" id="hintBody">
      <!-- filled dynamically -->
    </div>
  </div>

  <!-- TABLE HEADERS -->
  <div class="table-header-row">
    <div class="th-cell">Pokémon</div>
    <div class="th-cell">Type 1</div>
    <div class="th-cell">Type 2</div>
    <div class="th-cell">Evolution Stage</div>
    <div class="th-cell">Fully Evolved</div>
    <div class="th-cell">Color</div>
    <div class="th-cell">Habitats</div>
    <div class="th-cell">Gen.</div>
  </div>

  <!-- GUESSES -->
  <div id="emptyState" class="empty-state">
    Who's that Pokémon?<br>Make your first guess!
  </div>
  <div class="guesses-list" id="guessList"></div>

</div>

<!-- WIN MODAL -->
<div class="modal-overlay hidden" id="winModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal">&times;</button>
    <div class="modal-title">VICTORY!</div>
    <div class="modal-guessed-label">You Guessed: <span id="winName"></span></div>
    <div class="modal-pokemon">
      <img id="winImg" src="" alt="">
    </div>
    <button class="btn-play-again" id="playAgainBtn">Play Again</button>
  </div>
</div>

<div id="toastWrap"></div>

<div id="loadOverlay">
  <div class="pokeball"></div>
  <p>Loading Pokémon…</p>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const CFG = {
  LIMIT: 151,
  AC_MAX: 8,
  DEBOUNCE: 240,
  API: 'https://pokeapi.co/api/v2',
  // Earn a hint every N guesses
  HINT_INTERVAL: 3,
  MAX_HINTS: 3
};

document.addEventListener('DOMContentLoaded', async () => {

  try {
    await fetchList();
    await newGame();
    bindEvents();
  } catch(e) {

    console.error(e);
  } finally {
    setLoad(false);
    document.body.classList.add('ready');
  }
});

// ============================================================
// API
// ============================================================
async function fetchList() {
  const r = await fetch(`${CFG.API}/pokemon?limit=${CFG.LIMIT}`);
  const d = await r.json();
  S.list = d.results.map((p,i) => ({ name: p.name, url: p.url, id: i+1 }));
}

async function fetchDetails(url) {
  if (S.cache[url]) return S.cache[url];
  const [pr, sr] = await Promise.all([
    fetch(url),
    fetch(url.replace('/pokemon/', '/pokemon-species/'))
  ]);
  const pk = await pr.json();
  const sp = await sr.json();
  const evo = await getEvoStage(sp);
  const fe  = await checkFullyEvolved(sp);
  const obj = {
    id: pk.id, name: pk.name,
    sprite: pk.sprites.other?.['official-artwork']?.front_default || pk.sprites.front_default,
    type1: pk.types[0]?.type.name || 'none',
    type2: pk.types[1]?.type.name || 'none',
    generation: parseInt(sp.generation.url.split('/')[6]),
    color: sp.color?.name || 'unknown',
    habitat: sp.habitat?.name || 'unknown',
    evolution: evo,
    isFullyEvolved: fe
  };
  S.cache[url] = obj;
  return obj;
}

async function getEvoStage(sp) {
  try {
    const r = await fetch(sp.evolution_chain.url);
    const c = await r.json();
    let stage = 1;
    const find = (node, s) => {
      if (node.species.name === sp.name) { stage = s; return; }
      node.evolves_to.forEach(n => find(n, s+1));
    };
    find(c.chain, 1);
    return stage;
  } catch { return 1; }
}

async function checkFullyEvolved(sp) {
  try {
    const r = await fetch(sp.evolution_chain.url);
    const c = await r.json();
    let fe = true;
    const check = node => {
      if (node.species.name === sp.name) { fe = node.evolves_to.length === 0; return; }
      node.evolves_to.forEach(check);
    };
    check(c.chain);
    return fe;
  } catch { return true; }
}

// ============================================================
// GAME
// ============================================================
async function newGame() {
  S.guesses = [];
  S.hintsEarned = 0;
  S.hintsRevealed = [];
  S.activeHintTab = 0;
  S.won = false;

  D.input.value = '';
  D.input.dataset.selName = '';
  D.input.dataset.selUrl  = '';
  D.dropdown.classList.add('hidden');
  D.guessList.innerHTML = '';
  D.emptyState.style.display = '';
  D.hintPanel.classList.remove('visible');

  // Reset hint UI
  updateHintUI();

  setLoad(true);
  try {
    const rnd = S.list[Math.floor(Math.random() * S.list.length)];
    S.secret = await fetchDetails(rnd.url);
  } finally {
    setLoad(false);
  }
  D.input.focus();
}

// ============================================================
// HINT SYSTEM
// ============================================================
// Hints are earned every CFG.HINT_INTERVAL guesses
// Once earned the panel becomes openable; hints revealed on demand

function guessesUntilNextHint() {
  if (S.hintsEarned >= CFG.MAX_HINTS) return 0;
  const guessedSoFar = S.guesses.length;
  const needed = (S.hintsEarned + 1) * CFG.HINT_INTERVAL;
  return Math.max(0, needed - guessedSoFar);
}

function checkHintEarned() {
  const needed = (S.hintsEarned + 1) * CFG.HINT_INTERVAL;
  if (S.hintsEarned < CFG.MAX_HINTS && S.guesses.length >= needed) {
    S.hintsEarned++;
    return true;
  }
  return false;
}

function updateHintUI() {
  const left = guessesUntilNextHint();
  if (S.hintsEarned >= CFG.MAX_HINTS || (S.hintsEarned > 0 && left > 0)) {
    // Hints earned but panel already opened, just hide progress show button if more available
  }

  if (S.hintsEarned === 0) {
    // Nothing earned yet — show countdown
    D.hintProg.style.display = '';
    D.hintBtn.style.display = 'none';
    D.countdown.textContent = left;
  } else {
    // At least 1 hint earned — show HINT+ button (if more to earn or panel not yet opened)
    D.hintProg.style.display = 'none';
    D.hintBtn.style.display = '';
    // Button text updates based on whether panel is open
    D.hintBtn.disabled = S.hintsRevealed.length >= S.hintsEarned;
    D.hintBtn.innerHTML = `HINT <span class="plus">+</span>`;
  }

  // Update tabs
  const tabs = D.hintTabs.querySelectorAll('.hint-tab');
  tabs.forEach((tab, i) => {
    tab.classList.remove('active', 'locked');
    if (i < S.hintsEarned) {
      tab.innerHTML = `HINT ${i+1}`;
      tab.disabled = false;
      if (i === S.activeHintTab) tab.classList.add('active');
    } else {
      tab.innerHTML = `HINT ${i+1} <span class="lock">🔒</span>`;
      tab.classList.add('locked');
      tab.disabled = true;
    }
  });
}

function revealHintTab(idx) {
  if (idx >= S.hintsEarned) return;
  S.activeHintTab = idx;
  updateHintUI();
  renderHintBody();
}

// What hints to show at each slot
const HINT_TYPES = ['type', 'generation', 'firstLetter'];
const HINT_LABELS = {
  type:        'Type',
  generation:  'Generation',
  firstLetter: 'First Letter',
  silhouette:  'Silhouette'
};

function getHintContent(slot) {
  // slot 0 = type, slot 1 = generation, slot 2 = first letter
  const type = HINT_TYPES[slot] || 'type';
  const sec = S.secret;
  switch(type) {
    case 'type':
      return { type, label: 'Type', value: cap(sec.type1) };
    case 'generation':
      return { type, label: 'Generation', value: `Gen ${sec.generation}` };
    case 'firstLetter':
      return { type, label: 'First Letter', value: sec.name[0].toUpperCase() };
  }
}

function renderHintBody() {
  const slot = S.activeHintTab;
  if (slot >= S.hintsEarned) {
    const left = (slot + 1) * CFG.HINT_INTERVAL - S.guesses.length;
    D.hintBody.innerHTML = `
      <div class="hint-locked-msg">🔒 This hint unlocks<br>after ${left} more guess${left>1?'es':''}.</div>`;
    return;
  }
  const h = getHintContent(slot);
  if (!h) return;
  D.hintBody.innerHTML = `
    <div class="hint-type-label">${h.label}</div>
    <div class="hint-tile">${h.value}</div>
  `;
}

function openHintPanel() {
  if (S.hintsEarned === 0) return;
  D.hintPanel.classList.add('visible');
  // Mark as "used" up to current earned
  if (S.hintsRevealed.length < S.hintsEarned) {
    for (let i = S.hintsRevealed.length; i < S.hintsEarned; i++) {
      S.hintsRevealed.push(getHintContent(i));
    }
  }
  S.activeHintTab = S.hintsRevealed.length - 1;
  updateHintUI();
  renderHintBody();
  playSound('hint');
}

// ============================================================
// AUTOCOMPLETE
// ============================================================
let debTimer;
function onInput(v) {
  clearTimeout(debTimer);
  D.input.dataset.selName = '';
  D.input.dataset.selUrl  = '';
  if (!v.trim()) { D.dropdown.classList.add('hidden'); return; }
  debTimer = setTimeout(() => showDrop(v), CFG.DEBOUNCE);
}

function showDrop(q) {
  const lq = q.toLowerCase().trim();
  const guessed = new Set(S.guesses.map(g => g.name));
  const res = S.list.filter(p => p.name.includes(lq) && !guessed.has(p.name)).slice(0, CFG.AC_MAX);
  if (!res.length) { D.dropdown.classList.add('hidden'); return; }
  D.dropdown.innerHTML = res.map(p => `
    <div class="ac-item" data-name="${p.name}" data-url="${p.url}">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png" alt="${p.name}" loading="lazy">
      <span>${cap(p.name)}</span>
    </div>`).join('');
  D.dropdown.classList.remove('hidden');
}

function pickItem(name, url) {
  D.input.value = cap(name);
  D.input.dataset.selName = name;
  D.input.dataset.selUrl  = url;
  D.dropdown.classList.add('hidden');
}

// ============================================================
// SUBMIT
// ============================================================
async function submit() {
  if (S.won) return;

  let name = D.input.dataset.selName || '';
  let url  = D.input.dataset.selUrl  || '';

  if (!name) {
    const typed = D.input.value.trim().toLowerCase();
    const match = S.list.find(p => p.name === typed);
    if (match) { name = match.name; url = match.url; }
    else {
      const first = D.dropdown.querySelector('.ac-item');
      if (first) { name = first.dataset.name; url = first.dataset.url; }
    }
  }

  if (!name) { toast('Pick a Pokémon from the list!', true); return; }
  if (S.guesses.find(g => g.name === name)) { toast('Already guessed!', true); return; }

  D.input.disabled = true;
  D.dropdown.classList.add('hidden');

  try {
    const p = await fetchDetails(url);
    S.guesses.unshift(p);

    D.input.value = '';
    D.input.dataset.selName = '';
    D.input.dataset.selUrl  = '';

    renderGuesses();
    checkHintEarned();
    updateHintUI();

    // If hint panel is already open, re-enable button if new hint earned
    if (D.hintPanel.classList.contains('visible')) {
      // Refresh revealed hints
      while (S.hintsRevealed.length < S.hintsEarned) {
        S.hintsRevealed.push(getHintContent(S.hintsRevealed.length));
      }
      renderHintBody();
    }

    if (p.id === S.secret.id) {
      S.won = true;
      S.streak++;
      S.best = Math.max(S.streak, S.best);
      D.streakVal.textContent = S.streak;
      D.bestVal.textContent   = S.best;
      savePrefs();
      playSound('win');
      setTimeout(showWin, 600);
    }
  } catch(e) {
    toast('Error fetching Pokémon.', true);
    console.error(e);
  } finally {
    D.input.disabled = false;
    D.input.focus();
  }
}

// ============================================================
// RENDER GUESSES
// ============================================================
function renderGuesses() {
  if (!S.guesses.length) { D.emptyState.style.display = ''; return; }
  D.emptyState.style.display = 'none';

  D.guessList.innerHTML = S.guesses.map((g, animIdx) => {
    const c = cmp(g, S.secret);
    const isNew = animIdx === 0;
    const delay = (i) => isNew ? `animation-delay:${i * 0.13}s` : '';
    const flipCls = isNew ? ' flip' : '';
    const habitatHtml = buildHabitatCell(g.habitat, c.habitat, isNew, delay(5));
    return `
    <div class="guess-row" style="${isNew ? 'animation: rowIn 0.2s ease both' : ''}">
      <div class="guess-img-cell"><img src="${g.sprite || ''}" alt="${g.name}"></div>
      <div class="tile ${c.type1}${flipCls}" style="${delay(0)}">${cap(g.type1)}</div>
      <div class="tile ${c.type2}${flipCls}" style="${delay(1)}">${g.type2 === 'none' ? 'None' : cap(g.type2)}</div>
      <div class="tile ${c.evolution}${flipCls}" style="${delay(2)}">
        ${g.evolution}
        <span class="arrow">${arrow(g.evolution, S.secret.evolution)}</span>
      </div>
      <div class="tile ${c.isFullyEvolved}${flipCls}" style="${delay(3)}">${g.isFullyEvolved ? 'Yes' : 'No'}</div>
      <div class="tile ${c.color}${flipCls}" style="${delay(4)}">${cap(g.color)}</div>
      ${habitatHtml}
      <div class="tile ${c.generation}${flipCls}" style="${delay(6)}">
        ${g.generation}
        <span class="arrow">${arrow(g.generation, S.secret.generation)}</span>
      </div>
    </div>`;
  }).join('');
}

const HABITAT_DISPLAY = { 'rare': 'Volcano' };
function habitatName(h) { return HABITAT_DISPLAY[h] || cap(h); }

function buildHabitatCell(habitat, result, isNew, delayStyle) {
  const flipCls = isNew ? ' flip' : '';
  const delayAttr = delayStyle || '';
  if (habitat === 'unknown' || result === 'unknown') {
    return `<div class="tile unknown${flipCls}" style="${delayAttr}">?<br><span style="font-size:.45rem;opacity:.7;margin-top:4px;display:block">No Data</span></div>`;
  }
  const style = HABITAT_STYLE[habitat];
  const img = HABITAT_IMG[habitat];
  const barClass = result === 'correct' ? 'habitat-correct-bar' : 'habitat-incorrect-bar';
  const [c1, c2] = style ? style.bg.split(',') : ['#5a6a7a','#2a3a4a'];
  if (img) {
    return `<div class="habitat-tile${flipCls}" style="background:linear-gradient(160deg,${c1},${c2});${delayAttr}">
      <img class="habitat-pixel-art" src="${img}" alt="${habitatName(habitat)}">
      <div class="habitat-name">${habitatName(habitat)}</div>
      <div class="${barClass}" style="position:absolute;top:0;left:0;right:0;z-index:2;"></div>
    </div>`;
  }
  return `<div class="habitat-tile${flipCls}" style="background:linear-gradient(160deg,${c1},${c2});${delayAttr}">
    <div class="habitat-name">${habitatName(habitat)}</div>
    <div class="${barClass}"></div>
  </div>`;
}

// ============================================================
// COMPARE
// ============================================================
function cmp(g, s) {
  return {
    type1: (g.type1 === s.type1 || g.type1 === s.type2) ? 'correct' : 'incorrect',
    type2: (g.type2 === s.type1 || g.type2 === s.type2) ? 'correct' : 'incorrect',
    evolution: g.evolution === s.evolution ? 'correct' : 'incorrect',
    isFullyEvolved: g.isFullyEvolved === s.isFullyEvolved ? 'correct' : 'incorrect',
    color: g.color === s.color ? 'correct' : 'incorrect',
    habitat: (g.habitat === 'unknown' || s.habitat === 'unknown') ? 'unknown' : g.habitat === s.habitat ? 'correct' : 'incorrect',
    generation: g.generation === s.generation ? 'correct'
                : Math.abs(g.generation - s.generation) <= 1 ? 'partial' : 'incorrect'
  };
}

function arrow(g, s) {
  if (g === s) return '';
  return g < s ? '↑' : '↓';
}

// ============================================================
// WIN
// ============================================================
function showWin() {
  D.winImg.src = S.secret.sprite;
  D.winName.textContent = cap(S.secret.name);
  el('winModal').classList.remove('hidden');
}

// ============================================================
// EVENTS
// ============================================================
function bindEvents() {
  D.input.addEventListener('input', e => onInput(e.target.value));
  D.input.addEventListener('keydown', e => {
    if (e.key === 'Enter') submit();
    if (e.key === 'Escape') D.dropdown.classList.add('hidden');
  });

  D.dropdown.addEventListener('click', e => {
    const item = e.target.closest('.ac-item');
    if (item) pickItem(item.dataset.name, item.dataset.url);
  });

  D.hintBtn.addEventListener('click', openHintPanel);

  D.hintTabs.addEventListener('click', e => {
    const tab = e.target.closest('.hint-tab');
    if (tab && !tab.classList.contains('locked')) {
      revealHintTab(parseInt(tab.dataset.idx));
    }
  });

  el('closeModal').addEventListener('click', () => {
    el('winModal').classList.add('hidden');
    newGame();
  });
  el('playAgainBtn').addEventListener('click', () => {
    el('winModal').classList.add('hidden');
    newGame();
  });

  D.soundBtn.addEventListener('click', () => {
    const m = localStorage.getItem('pkdl_mute') === '1';
    localStorage.setItem('pkdl_mute', m ? '0' : '1');
    D.soundBtn.textContent = m ? '🔊' : '🔇';
  });

  document.addEventListener('click', e => {
    if (!D.input.contains(e.target) && !D.dropdown.contains(e.target))
      D.dropdown.classList.add('hidden');
  });
}

// ============================================================
// PREFS
// ============================================================
function loadPrefs() {
  S.streak = parseInt(localStorage.getItem('pkdl_streak')) || 0;
  S.best   = parseInt(localStorage.getItem('pkdl_best'))   || 0;
  D.streakVal.textContent = S.streak;
  D.bestVal.textContent   = S.best;
  if (localStorage.getItem('pkdl_mute') === '1') D.soundBtn.textContent = '🔇';
}
function savePrefs() {
  localStorage.setItem('pkdl_streak', S.streak);
  localStorage.setItem('pkdl_best',   S.best);
}

// ============================================================
// UTILS
// ============================================================
function cap(s) {
  if (!s || s === 'none') return 'None';
  return s.split('-').map(w => w[0].toUpperCase() + w.slice(1)).join('-');
}

function setLoad(on) { D.loadOver.classList.toggle('hidden', !on); }

function toast(msg, err=false) {
  const t = document.createElement('div');
  t.className = 'toast' + (err ? ' err' : '');
  t.textContent = msg;
  el('toastWrap').appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

function playSound(type) {
  if (localStorage.getItem('pkdl_mute') === '1') return;
  try {
    if (type === 'win') {
      const binary = atob(WIN_AUDIO_B64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      ctx.decodeAudioData(bytes.buffer, buf => {
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
      });
    } else if (type === 'hint') {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.frequency.value = 440; osc.type = 'sine';
      g.gain.setValueAtTime(.18, now);
      g.gain.exponentialRampToValueAtTime(.001, now + .1);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(now); osc.stop(now + .15);
    }
  } catch(e) { console.error(e); }
}
